<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satej's Web Dev Portfolio — SY Sem 3</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0c0f;
    --surface: #13151a;
    --surface2: #1c1f27;
    --border: #2a2e3a;
    --accent: #e8ff47;
    --accent2: #47c8ff;
    --accent3: #ff6b47;
    --text: #e8eaf0;
    --muted: #6b7280;
    --done: #4ade80;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  header {
    position: relative; z-index: 1;
    padding: 60px 40px 40px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 20px;
  }
  .header-title { display: flex; flex-direction: column; gap: 8px; }
  .badge {
    font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.15em;
    color: var(--accent); background: rgba(232,255,71,0.08); border: 1px solid rgba(232,255,71,0.2);
    padding: 4px 12px; border-radius: 2px; width: fit-content; text-transform: uppercase;
  }
  h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; line-height: 1.05; letter-spacing: -0.02em; }
  h1 span { color: var(--accent); }
  .sub { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); letter-spacing: 0.05em; }
  .header-stats { display: flex; gap: 24px; align-items: center; }
  .stat { text-align: center; }
  .stat-num { font-size: 2rem; font-weight: 800; color: var(--accent); line-height: 1; }
  .stat-label { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }
  .progress-section {
    position: relative; z-index: 1; padding: 24px 40px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  }
  .progress-label { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; }
  .progress-bar-wrap { flex: 1; min-width: 200px; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; animation: progressIn 1.2s cubic-bezier(0.16,1,0.3,1) forwards; }
  @keyframes progressIn { from { width: 0; } to { width: 100%; } }
  .progress-pct { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: var(--accent); }
  main { position: relative; z-index: 1; padding: 40px; max-width: 1400px; margin: 0 auto; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; }
  .filter-btn {
    font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 8px 16px; border: 1px solid var(--border); background: transparent; color: var(--muted);
    cursor: pointer; border-radius: 2px; transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 700; }
  .assignments-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 2px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); padding: 28px;
    cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden;
    animation: cardIn 0.4s ease both;
  }
  @keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(232,255,71,0.04) 0%, transparent 60%);
    opacity: 0; transition: opacity 0.25s;
  }
  .card:hover::before { opacity: 1; }
  .card:hover { border-color: rgba(232,255,71,0.3); transform: translateY(-2px); }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
  .card-num { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; }
  .status-dot.done { background: var(--done); box-shadow: 0 0 8px var(--done); }
  .card-title { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.01em; margin-bottom: 8px; line-height: 1.2; }
  .card-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.5; margin-bottom: 16px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 8px; border: 1px solid var(--border); border-radius: 2px; color: var(--muted); }
  .card-action { margin-top: 20px; display: flex; align-items: center; gap: 8px; font-family: 'Space Mono', monospace; font-size: 10px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; }
  .card-action::after { content: '→'; font-size: 14px; transition: transform 0.2s; }
  .card:hover .card-action::after { transform: translateX(4px); }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(11,12,15,0.92); backdrop-filter: blur(8px);
    z-index: 1000; display: flex; align-items: flex-start; justify-content: center;
    padding: 24px; opacity: 0; pointer-events: none; transition: opacity 0.25s; overflow-y: auto;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); width: 100%; max-width: 900px;
    min-height: 80vh; transform: translateY(20px); transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-bar { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap; }
  .modal-title { font-weight: 800; font-size: 1rem; letter-spacing: -0.01em; }
  .modal-meta { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.08em; }
  .modal-close { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); background: transparent; border: 1px solid var(--border); cursor: pointer; padding: 6px 14px; border-radius: 2px; transition: all 0.2s; letter-spacing: 0.08em; text-transform: uppercase; margin-left: auto; }
  .modal-close:hover { border-color: var(--accent3); color: var(--accent3); }
  .modal-tabs { display: flex; border-bottom: 1px solid var(--border); }
  .tab-btn { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 12px 20px; background: transparent; border: none; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .modal-content { flex: 1; display: flex; flex-direction: column; }
  .preview-wrap { flex: 1; min-height: 500px; background: #fff; }
  .preview-wrap iframe { width: 100%; height: 100%; min-height: 500px; border: none; display: block; }
  .preview-wrap.hidden { display: none; }
  .code-wrap { flex: 1; overflow: auto; padding: 24px; display: none; }
  .code-wrap.visible { display: block; }
  pre { font-family: 'Space Mono', monospace; font-size: 12px; line-height: 1.7; color: #cdd6f4; white-space: pre-wrap; word-break: break-all; }
  .hl-tag { color: #89b4fa; } .hl-attr { color: #fab387; } .hl-val { color: #a6e3a1; } .hl-comment { color: #6c7086; font-style: italic; }
  footer { position: relative; z-index: 1; padding: 32px 40px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .footer-text { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }
  .footer-link { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent2); text-decoration: none; letter-spacing: 0.05em; }
  .footer-link:hover { text-decoration: underline; }
  @media (max-width: 600px) { header, main, footer { padding: 24px 20px; } .progress-section { padding: 16px 20px; } h1 { font-size: 1.8rem; } }
</style>
</head>

  { num:"08", title:"Advanced List Tags", desc:"Nested lists, custom styled bullets, definition lists and deep list nesting techniques.", tags:["HTML","Lists","dl/dt/dd"], status:"done", code:`<!DOCTYPE html>
<html><head><title>Advanced Lists</title>

  { num:"11", title:"XML Study", desc:"XML document structure, syntax rules, XSD schema definition and well-formedness validation.", tags:["XML","XSD","Schema"], status:"done", code:`<!DOCTYPE html>
<html><head><title>XML Study</title>
<style>body{font-family:Arial;padding:30px;background:#0b0c0f;color:#e8eaf0;}h1{color:#e8ff47;border-bottom:1px solid #2a2e3a;padding-bottom:10px;}h2{color:#47c8ff;margin:28px 0 12px;}pre{background:#13151a;border:1px solid #2a2e3a;padding:20px;font-size:13px;line-height:1.7;overflow-x:auto;border-radius:4px;color:#a6e3a1;font-family:'Courier New',monospace;}.note{background:rgba(232,255,71,0.08);border-left:3px solid #e8ff47;padding:12px 16px;margin:16px 0;}ul{padding-left:24px;color:#ccc;line-height:2;}li span{color:#e8ff47;font-weight:bold;}</style>
</head><body>
<h1>XML Study — Assignment 11</h1>
<h2>What is XML?</h2>
<p>XML (eXtensible Markup Language) stores and transports data using user-defined tags.</p>
<div class="note">✦ Unlike HTML, XML tags are <strong>user-defined</strong> — you create tags to describe your data.</div>
<h2>Sample XML Document</h2>
<pre>&lt;?xml version="1.0" encoding="UTF-8"?&gt;
&lt;students&gt;
  &lt;student rollno="101"&gt;
    &lt;name&gt;Satej&lt;/name&gt;
    &lt;branch&gt;Computer Science&lt;/branch&gt;
    &lt;semester&gt;3&lt;/semester&gt;
    &lt;marks&gt;
      &lt;subject name="Web Technology"&gt;91&lt;/subject&gt;
      &lt;subject name="DBMS"&gt;85&lt;/subject&gt;
    &lt;/marks&gt;
  &lt;/student&gt;
&lt;/students&gt;</pre>
<h2>XSD Schema</h2>
<pre>&lt;xs:schema xmlns:xs="http://www.w3.org/2001/XMLSchema"&gt;
  &lt;xs:element name="students"&gt;
    &lt;xs:complexType&gt;
      &lt;xs:sequence&gt;
        &lt;xs:element name="student" maxOccurs="unbounded"&gt;
          &lt;xs:complexType&gt;
            &lt;xs:sequence&gt;
              &lt;xs:element name="name" type="xs:string"/&gt;
              &lt;xs:element name="branch" type="xs:string"/&gt;
              &lt;xs:element name="semester" type="xs:integer"/&gt;
            &lt;/xs:sequence&gt;
            &lt;xs:attribute name="rollno" type="xs:integer" use="required"/&gt;
          &lt;/xs:complexType&gt;
        &lt;/xs:element&gt;
      &lt;/xs:sequence&gt;
    &lt;/xs:complexType&gt;
  &lt;/xs:element&gt;
&lt;/xs:schema&gt;</pre>
<h2>XML Rules</h2>
<ul>
  <li><span>Root element</span> — Must have exactly one root element</li>
  <li><span>Closing tags</span> — All elements must be properly closed</li>
  <li><span>Case-sensitive</span> — &lt;Name&gt; ≠ &lt;name&gt;</li>
  <li><span>Proper nesting</span> — Elements must be correctly nested</li>
  <li><span>Quoted attributes</span> — Attribute values must be in quotes</li>
</ul>
</body></html>` },

  { num:"13", title:"Student Application (XSLT)", desc:"Student result system using XSLT with xsl:if and xsl:choose conditionals for grade and pass/fail.", tags:["XML","XSLT","xsl:if","xsl:choose"], status:"done", code:`<!DOCTYPE html>
<html><head><title>Student Application</title>
<style>body{font-family:Arial;padding:30px;background:#0b0c0f;color:#e8eaf0;}h1{color:#e8ff47;border-bottom:1px solid #2a2e3a;padding-bottom:10px;}h2{color:#47c8ff;margin:28px 0 12px;}pre{background:#13151a;border:1px solid #2a2e3a;padding:20px;font-size:13px;line-height:1.8;overflow-x:auto;border-radius:4px;font-family:'Courier New',monospace;color:#89b4fa;}table{width:100%;border-collapse:collapse;margin-top:12px;}th{background:#1a1a2e;color:#e8ff47;padding:12px 16px;text-align:left;}td{padding:10px 16px;border-bottom:1px solid #2a2e3a;font-size:14px;color:#cdd6f4;}tr:nth-child(even) td{background:#13151a;}.pass{color:#4ade80;font-weight:bold;}.fail{color:#ff6b47;font-weight:bold;}.dist{color:#e8ff47;}.first{color:#47c8ff;}.second{color:#a6e3a1;}</style>
</head><body>
<h1>Student Application — XSLT Conditionals</h1>
<h2>XML Source</h2>
<pre>&lt;students&gt;
  &lt;student&gt;&lt;name&gt;Satej&lt;/name&gt;&lt;rollno&gt;101&lt;/rollno&gt;&lt;marks&gt;91&lt;/marks&gt;&lt;/student&gt;
  &lt;student&gt;&lt;name&gt;Prachi&lt;/name&gt;&lt;rollno&gt;102&lt;/rollno&gt;&lt;marks&gt;88&lt;/marks&gt;&lt;/student&gt;
  &lt;student&gt;&lt;name&gt;Atharv&lt;/name&gt;&lt;rollno&gt;103&lt;/rollno&gt;&lt;marks&gt;72&lt;/marks&gt;&lt;/student&gt;
  &lt;student&gt;&lt;name&gt;Riya&lt;/name&gt;&lt;rollno&gt;104&lt;/rollno&gt;&lt;marks&gt;54&lt;/marks&gt;&lt;/student&gt;
  &lt;student&gt;&lt;name&gt;Rohit&lt;/name&gt;&lt;rollno&gt;105&lt;/rollno&gt;&lt;marks&gt;32&lt;/marks&gt;&lt;/student&gt;
&lt;/students&gt;</pre>
<h2>XSLT with xsl:choose &amp; xsl:if</h2>
<pre>&lt;xsl:for-each select="students/student"&gt;
  &lt;tr&gt;
    &lt;td&gt;&lt;xsl:value-of select="name"/&gt;&lt;/td&gt;
    &lt;td&gt;&lt;xsl:value-of select="marks"/&gt;&lt;/td&gt;
    &lt;td&gt;

&lt;/xsl:for-each&gt;</pre>

function renderGrid(filter='all') {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  assignments.forEach((a,i) => {
    if (filter !== 'all' && a.status !== filter) return;
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${0.05 + i * 0.05}s`;
    card.innerHTML = `
      <div class="card-header">
        <div class="card-num">ASSIGNMENT ${a.num}</div>
        <div class="status-dot done"></div>
      </div>
      <div class="card-title">${a.title}</div>
      <div class="card-desc">${a.desc}</div>
      <div class="card-tags">${a.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div class="card-action">View Assignment</div>`;
    card.onclick = () => openModal(a);
    grid.appendChild(card);
  });
}

function filterCards(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid(filter);
}

function openModal(a) {
  document.getElementById('modalMeta').textContent = `ASSIGNMENT ${a.num}`;
  document.getElementById('modalTitle').textContent = a.title;
  document.getElementById('previewFrame').srcdoc = a.code;
  document.getElementById('codeContent').innerHTML = hl(a.code);
  switchTab('preview');
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function switchTab(tab) {
  const p = tab === 'preview';
  document.getElementById('previewWrap').classList.toggle('hidden', !p);
  document.getElementById('codeWrap').classList.toggle('visible', !p);
  document.getElementById('tabPreview').classList.toggle('active', p);
  document.getElementById('tabCode').classList.toggle('active', !p);
}

function hl(code) {
  return code
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(&lt;!--[\s\S]*?--&gt;)/g,'<span class="hl-comment">$1</span>')
    .replace(/(&lt;\/?)([\w:]+)/g,'<span class="hl-tag">$1$2</span>')
    .replace(/\s([\w:-]+)=/g,' <span class="hl-attr">$1</span>=')
    .replace(/="([^"]*)"/g,'="<span class="hl-val">$1</span>"');
}

document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });
renderGrid();
</script>
</body>
</html>
